<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS Random Allocator</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    opacity: 0.7;
    margin-bottom: 20px;
}

/* INPUT AREA */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 120px;
    border-radius: 10px;
    border: none;
    padding: 12px;
    font-size: 1rem;
    resize: none;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 1.2rem;
    font-weight: bold;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    transform: translateY(-2px);
}

/* RESULTS */
.results {
    display: none;
}

.results.show {
    display: block;
    animation: fadeIn 0.4s ease;
}

.result {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.07);
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.result.winner {
    border: 2px solid #22c55e;
    background: rgba(34,197,94,0.15);
}

.choice {
    font-size: 1.3rem;
}

.winner-banner {
    text-align: center;
    margin-bottom: 15px;
    font-size: 1.2rem;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>🪨 📄 ✂️</h1>
<div class="subtitle">Rock • Paper • Scissors Allocator</div>

<div class="card">
    <p>Enter player names (one per line):</p>
    <textarea id="players">Alice
Bob</textarea>

    <button onclick="runGame()">🎲 Run Game</button>
</div>

<div id="results" class="results card">
    <div id="winnerText" class="winner-banner"></div>
    <div id="resultList"></div>
</div>

</div>

<script>
const choices = [
    { name: 'Rock', emoji: '🪨' },
    { name: 'Paper', emoji: '📄' },
    { name: 'Scissors', emoji: '✂️' }
];

function getWinner(results) {
    const unique = [...new Set(results.map(r => r.choice.name))];

    // Draw conditions
    if (unique.length === 3 || unique.length === 1) {
        return null;
    }

    const winMap = {
        Rock: 'Scissors',
        Paper: 'Rock',
        Scissors: 'Paper'
    };

    const winningChoice = unique.find(c =>
        unique.every(other => c === other || winMap[c] === other)
    );

    return results.filter(r => r.choice.name === winningChoice);
}

function runGame() {
    const input = document.getElementById('players').value;
    const names = input.split('\n').map(n => n.trim()).filter(n => n);

    if (names.length < 2) {
        alert("Enter at least 2 players");
        return;
    }

    const results = names.map(name => ({
        name,
        choice: choices[Math.floor(Math.random() * 3)]
    }));

    displayResults(results);
}

function displayResults(results) {
    const container = document.getElementById('results');
    const list = document.getElementById('resultList');
    const winnerText = document.getElementById('winnerText');

    list.innerHTML = '';

    const winners = getWinner(results);

    if (!winners) {
        winnerText.innerHTML = "🤝 It's a draw!";
    } else {
        winnerText.innerHTML = "🏆 Winner: " + winners.map(w => w.name).join(', ');
    }

    results.forEach(r => {
        const div = document.createElement('div');
        div.className = 'result';

        if (winners && winners.includes(r)) {
            div.classList.add('winner');
        }

        div.innerHTML = `
            <span>${escapeHtml(r.name)}</span>
            <span class="choice">${r.choice.emoji} ${r.choice.name}</span>
        `;

        list.appendChild(div);
    });

    container.classList.add('show');
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

</body>
</html>
