<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS Tournament</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
}

h1, .subtitle {
    text-align: center;
}

.subtitle {
    opacity: 0.7;
    margin-bottom: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

select, input, button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

button {
    font-size: 1.2rem;
    font-weight: bold;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    cursor: pointer;
}

.results {
    display: none;
}

.results.show {
    display: block;
}

.result {
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.07);
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s ease;
}

.result.show {
    opacity: 1;
    transform: translateY(0);
}

.result.winner {
    border: 2px solid #22c55e;
    background: rgba(34,197,94,0.15);
}

.round-title {
    margin-top: 15px;
    font-weight: bold;
}

.round-summary {
    margin-top: 5px;
    margin-bottom: 10px;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.round-summary.show {
    opacity: 1;
}

.choice {
    font-size: 1.2rem;
}

.winner-banner {
    text-align: center;
    margin-bottom: 10px;
    font-size: 1.3rem;
}

.fade {
    opacity: 0.6;
    font-style: italic;
}
</style>
</head>

<body>

<div class="container">

<h1>🪨 📄 ✂️</h1>
<div class="subtitle">Animated RPS Tournament</div>

<div class="card">
    <label>Number of players:</label>
    <select id="playerCount"></select>

    <div id="playerInputs"></div>

    <button onclick="runGame()">🎲 Start Tournament</button>
</div>

<div id="results" class="results card">
    <div id="winnerText" class="winner-banner"></div>
    <div id="resultList"></div>
</div>

</div>

<script>
const choices = [
    { name: 'Rock', emoji: '🪨' },
    { name: 'Paper', emoji: '📄' },
    { name: 'Scissors', emoji: '✂️' }
];

const select = document.getElementById('playerCount');
const inputContainer = document.getElementById('playerInputs');

for (let i = 2; i <= 20; i++) {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = i + " players";
    select.appendChild(option);
}

select.addEventListener('change', generateInputs);
generateInputs();

function generateInputs() {
    inputContainer.innerHTML = '';
    const count = parseInt(select.value);

    for (let i = 0; i < count; i++) {
        const input = document.createElement('input');
        input.placeholder = `Player ${i + 1}`;
        inputContainer.appendChild(input);
    }
}

function getWinner(results) {
    const unique = [...new Set(results.map(r => r.choice.name))];
    if (unique.length !== 2) return null;

    const winMap = {
        Rock: 'Scissors',
        Paper: 'Rock',
        Scissors: 'Paper'
    };

    const winningChoice = unique.find(c =>
        unique.every(other => c === other || winMap[c] === other)
    );

    return results.filter(r => r.choice.name === winningChoice);
}

function runGame() {
    const inputs = inputContainer.querySelectorAll('input');

    let players = [];
    inputs.forEach((input, i) => {
        const name = input.value.trim() || `Player ${i + 1}`;
        players.push({ name });
    });

    runTournament(players);
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function runTournament(players) {
    const container = document.getElementById('results');
    const list = document.getElementById('resultList');
    const winnerText = document.getElementById('winnerText');

    list.innerHTML = '';
    container.classList.add('show');

    let round = 1;

    while (players.length > 1) {

        const results = players.map(p => ({
            ...p,
            choice: choices[Math.floor(Math.random() * 3)]
        }));

        const winners = getWinner(results);

        const title = document.createElement('div');
        title.className = 'round-title';
        title.textContent = `Round ${round}`;
        list.appendChild(title);

        if (!winners) {
            const draw = document.createElement('div');
            draw.className = 'fade';
            draw.textContent = "🤝 Draw — replaying round";
            list.appendChild(draw);
            await sleep(1000);
            continue;
        }

        // Animate each player reveal
        for (const r of results) {
            const div = document.createElement('div');
            div.className = 'result';

            if (winners.includes(r)) {
                div.classList.add('winner');
            }

            div.innerHTML = `
                <span>${escapeHtml(r.name)}</span>
                <span class="choice">${r.choice.emoji} ${r.choice.name}</span>
            `;

            list.appendChild(div);

            await sleep(300);
            div.classList.add('show');
        }

        // Winner summary appears after
        const summary = document.createElement('div');
        summary.className = 'round-summary';
        summary.textContent = `➡️ Round Winner(s): ${winners.map(w => w.name).join(', ')}`;
        list.appendChild(summary);

        await sleep(300);
        summary.classList.add('show');

        await sleep(1000);

        players = winners.map(w => ({ name: w.name }));
        round++;
    }

    winnerText.textContent = `🏆 Champion: ${players[0].name}`;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

</body>
</html>
