<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPS Tournament</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
}

h1, .subtitle {
    text-align: center;
}

.subtitle {
    opacity: 0.7;
    margin-bottom: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

select, button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size: 1rem;
    margin-top: 10px;
}

button {
    font-size: 1.2rem;
    font-weight: bold;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    cursor: pointer;
}

button:hover {
    transform: translateY(-2px);
}

.results {
    display: none;
}

.results.show {
    display: block;
    animation: fadeIn 0.4s ease;
}

.result {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.07);
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 10px;
}

.result.winner {
    border: 2px solid #22c55e;
    background: rgba(34,197,94,0.15);
}

.choice {
    font-size: 1.3rem;
}

.round-title {
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: bold;
    opacity: 0.85;
}

.winner-banner {
    text-align: center;
    margin-bottom: 15px;
    font-size: 1.3rem;
}

.fade {
    opacity: 0.6;
    font-style: italic;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>🪨 📄 ✂️</h1>
<div class="subtitle">RPS Elimination Tournament</div>

<div class="card">
    <label for="playerCount">Number of players:</label>
    <select id="playerCount"></select>

    <button onclick="runGame()">🎲 Start Tournament</button>
</div>

<div id="results" class="results card">
    <div id="winnerText" class="winner-banner"></div>
    <div id="resultList"></div>
</div>

</div>

<script>
const choices = [
    { name: 'Rock', emoji: '🪨' },
    { name: 'Paper', emoji: '📄' },
    { name: 'Scissors', emoji: '✂️' }
];

// Populate dropdown (2–20)
const select = document.getElementById('playerCount');
for (let i = 2; i <= 20; i++) {
    const option = document.createElement('option');
    option.value = i;
    option.textContent = i + " players";
    select.appendChild(option);
}

function getWinner(results) {
    const unique = [...new Set(results.map(r => r.choice.name))];

    if (unique.length !== 2) return null;

    const winMap = {
        Rock: 'Scissors',
        Paper: 'Rock',
        Scissors: 'Paper'
    };

    const winningChoice = unique.find(c =>
        unique.every(other => c === other || winMap[c] === other)
    );

    return results.filter(r => r.choice.name === winningChoice);
}

function runGame() {
    const count = parseInt(select.value);

    let players = Array.from({ length: count }, (_, i) => ({
        name: `Player ${i + 1}`
    }));

    runTournament(players);
}

function runTournament(players) {
    const container = document.getElementById('results');
    const list = document.getElementById('resultList');
    const winnerText = document.getElementById('winnerText');

    list.innerHTML = '';
    container.classList.add('show');

    let round = 1;

    while (players.length > 1) {

        const results = players.map(p => ({
            ...p,
            choice: choices[Math.floor(Math.random() * 3)]
        }));

        const winners = getWinner(results);

        // Round title
        const title = document.createElement('div');
        title.className = 'round-title';
        title.textContent = `Round ${round}`;
        list.appendChild(title);

        if (!winners) {
            const draw = document.createElement('div');
            draw.className = 'fade';
            draw.textContent = "🤝 Draw — replaying round";
            list.appendChild(draw);
            continue;
        }

        results.forEach(r => {
            const div = document.createElement('div');
            div.className = 'result';

            if (winners.includes(r)) {
                div.classList.add('winner');
            }

            div.innerHTML = `
                <span>${r.name}</span>
                <span class="choice">${r.choice.emoji} ${r.choice.name}</span>
            `;

            list.appendChild(div);
        });

        players = winners.map(w => ({ name: w.name }));
        round++;
    }

    winnerText.textContent = `🏆 Champion: ${players[0].name}`;
}
</script>

</body>
</html>
