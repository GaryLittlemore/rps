<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock, Paper, Scissors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #22c55e;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 30px 15px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.6rem;
      letter-spacing: 0.5px;
    }

    .field {
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 999px;
      border: none;
      background: #020617;
      color: var(--text);
      outline: none;
      font-size: 15px;
    }

    input::placeholder {
      color: var(--muted);
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 12px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
    }

    .primary {
      background: var(--accent);
      color: #022c22;
    }

    .secondary {
      background: #334155;
      color: var(--text);
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .players {
      margin-top: 15px;
    }

    .result {
      margin-top: 20px;
    }

    .card {
      background: #020617;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .winner {
      border: 1px solid var(--accent);
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="app">
  <h1>🎮 RPS Arena</h1>

  <div class="field">
    <input type="number" id="playerCount" placeholder="How many players?" min="2">
  </div>

  <div class="players" id="players"></div>

  <div class="buttons">
    <button class="secondary" onclick="generatePlayers()">Setup</button>
    <button class="primary" onclick="runGame()">Run</button>
  </div>

  <div class="result" id="results"></div>
</div>

<script>
  const choices = ["Rock", "Paper", "Scissors"];

  function generatePlayers() {
    const count = document.getElementById("playerCount").value;
    const container = document.getElementById("players");
    container.innerHTML = "";

    for (let i = 0; i < count; i++) {
      const input = document.createElement("input");
      input.placeholder = "Player " + (i + 1);
      input.className = "field";
      container.appendChild(input);
    }
  }

  function runGame() {
    const inputs = document.querySelectorAll("#players input");
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    let players = [];

    inputs.forEach((input, i) => {
      const name = input.value || "Player " + (i + 1);
      const choice = choices[Math.floor(Math.random() * 3)];
      players.push({ name, choice });
    });

    const unique = [...new Set(players.map(p => p.choice))];
    let winners = [];

    if (unique.length === 2) {
      if (unique.includes("Rock") && unique.includes("Scissors")) {
        winners = players.filter(p => p.choice === "Rock");
      }
      if (unique.includes("Scissors") && unique.includes("Paper")) {
        winners = players.filter(p => p.choice === "Scissors");
      }
      if (unique.includes("Paper") && unique.includes("Rock")) {
        winners = players.filter(p => p.choice === "Paper");
      }
    }

    players.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";

      if (winners.includes(p)) {
        div.classList.add("winner");
      }

      div.innerHTML = `<span>${p.name}</span><span>${p.choice}</span>`;
      resultsDiv.appendChild(div);
    });

    const footer = document.createElement("div");
    footer.className = "footer";

    if (winners.length === 0) {
      footer.textContent = "Draw!";
    } else {
      footer.textContent = "Winner: " + winners.map(w => w.name).join(", ");
    }

    resultsDiv.appendChild(footer);
  }
</script>

</body>
</html>
